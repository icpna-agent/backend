# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - wsm-icpna-landing-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: landing-backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
    
jobs:
  test:
    name: Test the Docker image before deploying
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: backend_database
      ADMIN_MAIL: ${{ secrets.ADMIN_MAIL }}
      ADMIN_PSWD: ${{ secrets.ADMIN_PSWD }}
      JWT_SECRET: ${{ secrets.TEST_TOKEN_KEY }}
      JWT_REFRESH_SECRET: ${{ secrets.TEST_REFRESH_KEY }}
      ACCESS_TOKEN_VALIDITY_DURATION_IN_SEC: 240
      REFRESH_TOKEN_VALIDITY_DURATION_IN_SEC: 604800

      ENGINE_HOST: ${{ secrets.ENGINE_HOST }}
      LANDING_PAGE: ${{ secrets.LANDING_PAGE }}
      LANDING_MP_SUCCESS_PATH: success
      LANDING_MP_PENDING_PATH: pending
      LANDING_MP_FAILURE_PATH: failure

      MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
      MP_ACCESS_TOKEN_TEST: ${{ secrets.MP_ACCESS_TOKEN_TEST }}
      ITSELF: http://localhost:3000

    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: backend_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d backend_database"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node runtime
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test database
        run: npm run db:create

      - name: Seed test database
        run: npm run db:seed

      - name: Run unit tests
        run: npm test -- --runInBand --passWithNoTests

      - name: Run E2E tests
        run: npm run test:e2e

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
      packages: read #This is required for migrations

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io/
          username: WettiestMan
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wettiestman/landing-backend:${{ github.sha }}
          file: ./Dockerfile
      
      - name: Build the database
        run: |
          docker run --rm \
            -e DB_HOST=${{ secrets.PROD_DB_HOST }} \
            -e DB_PORT=${{ secrets.PROD_DB_PORT }} \
            -e DB_USER=${{ secrets.PROD_DB_USER }} \
            -e DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
            -e DB_NAME=${{ secrets.PROD_DB_NAME }} \
            ghcr.io/wettiestman/landing-backend:${{ github.sha }} \
            npm run db:migrate

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
    
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6A76E3C7754546BD994B25300063B293 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C38764DF76A44276B2749200027118B0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_69CA6B5DF47B4A7980E4260C870729E6 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'wsm-icpna-landing-backend'
          slot-name: 'Production'
          images: 'ghcr.io/wettiestman/landing-backend:${{ github.sha }}'
